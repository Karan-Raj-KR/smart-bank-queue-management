[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
# Run migrations and train the ML model, then boot FastAPI + Celery worker
# concurrently via a simple shell background job.
cmd = """
alembic upgrade head && \
python ml/train.py && \
celery -A app.tasks.notifications worker --loglevel=info --concurrency=2 & \
uvicorn app.main:app --host 0.0.0.0 --port $PORT
"""
